services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: insight
      POSTGRES_PASSWORD: insight
      POSTGRES_DB: insight
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  opensearch:
    image: opensearchproject/opensearch:2
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "InsightNotebook1!"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  seaweedfs:
    image: chrislusf/seaweedfs:3.80
    command: server -s3 -dir=/data
    ports:
      - "8333:8333"
      - "9333:9333"
    volumes:
      - seaweedfs-data:/data

volumes:
  postgres-data:
  opensearch-data:
  seaweedfs-data:

